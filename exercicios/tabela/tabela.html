<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <link rel="shortcut icon" href="../../dedodomeio.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Estado</th>
                <th>População</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td> <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Bandeira_do_estado_de_São_Paulo.svg/40px-Bandeira_do_estado_de_São_Paulo.svg.png" alt="São paulo"> São Paulo</td>
                <td class="num">46.081.801</td>
            </tr>
            <tr>
                <td> <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Bandeira_de_Minas_Gerais.svg/40px-Bandeira_de_Minas_Gerais.svg.png" alt="Minas gerais"> Minas Gerais</td>
                <td class="num">21.393.441</td>
            </tr>
            <tr>
                <td> <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Bandeira_da_Bahia.svg/40px-Bandeira_da_Bahia.svg.png" alt="Bahia"> Bahia</td>
                <td class="num">14.870.907</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>Total de Habitantes</th>
                <th class="num"><strong>82.346.149</strong></th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
